name: Coverage

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false

      # TODO: re-enable cache. Temporarily disabled because the post-job cache
      # save is slow on the self-hosted runner (which already keeps GOCACHE /
      # GOMODCACHE warm between runs, making actions/cache redundant here).
      # - name: Get Go environment
      #   id: go-env
      #   run: |
      #     echo "::set-output name=cache::$(go env GOCACHE)"
      #     echo "::set-output name=modcache::$(go env GOMODCACHE)"
      # - name: Set up cache
      #   uses: actions/cache@v5
      #   with:
      #     path: |
      #       ${{ steps.go-env.outputs.cache }}
      #       ${{ steps.go-env.outputs.modcache }}
      #     key: test-${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}-${{ hashFiles('**/go.mod') }}
      #     restore-keys: |
      #       test-${{ runner.os }}-go-

      - name: Checkout code
        uses: actions/checkout@v7

      - name: Run tests with coverage
        run: make coverage

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: profile.out
          if-no-files-found: error
          retention-days: 1

  upload:
    runs-on: ubuntu-latest
    needs:
      - test
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: coverage

      - name: Send coverage
        uses: codecov/codecov-action@v7
        with:
          files: profile.out
          fail_ci_if_error: true
